{% extends "admin/base.html" %}
{% block content %}
<div class="card">
  <h2>Step 1 of 3 — Welcome</h2>
  <p class="dim" style="margin-bottom:6px">Let's set up your SignalShack.
  Takes about five minutes, no account needed.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/admin/setup">
    <label>Create an admin password — protects settings only; anyone on your
    WiFi can view the display without it</label>
    <input type="password" name="password" required minlength="8" autofocus>
    <label>Confirm password</label>
    <input type="password" name="password2" required>
    <button type="submit">Continue</button>
  </form>
</div>
{% endblock %}
