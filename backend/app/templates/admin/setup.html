{% extends "admin/base.html" %}
{% block content %}
<div class="card">
  <h2>Welcome — set up your SignalShack</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/admin/setup">
    <label>Admin password (protects settings only — anyone on your WiFi can view the display)</label>
    <input type="password" name="password" required minlength="8">
    <label>Confirm password</label>
    <input type="password" name="password2" required>
    <label>ZIP code</label>
    <input type="text" name="zipcode" placeholder="11758">
    {% if zip_failed %}
      <label>Latitude</label><input type="text" name="latitude">
      <label>Longitude</label><input type="text" name="longitude">
      <label>Location label</label><input type="text" name="label" value="Home">
    {% endif %}
    <label>Timezone</label>
    <input type="text" name="timezone" value="America/New_York">
    <button type="submit">Finish setup</button>
  </form>
</div>
{% endblock %}
