<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalShack</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0d1117">
<link rel="icon" href="/static/icon.svg">
<script src="/static/htmx.min.js"></script>
<style>
  :root{--bg:#0d1117;--card:#161d27;--edge:#1f2937;--text:#e8edf4;--dim:#8b98a9;
        --faint:#5c6878;--green:#3fb96b;--amber:#e0a63d;--red:#e05d5d}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);
       font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
       display:flex;flex-direction:column;padding:2.2vh 2.2vw;gap:1.8vh;
       transition:filter 1s}
  body.night{filter:brightness(.55)}
  header{display:flex;justify-content:space-between;align-items:baseline}
  .clock{font-size:5.2vh;font-weight:600;letter-spacing:.01em}
  .clock small{font-size:2.4vh;font-weight:400;color:var(--dim);margin-left:1.2vw}
  .pip{display:flex;align-items:center;gap:.6vw;color:var(--dim);font-size:1.9vh}
  .pip .dot{width:1.4vh;height:1.4vh;border-radius:50%}
  .pip .dot.green{background:var(--green);box-shadow:0 0 .8vh rgba(63,185,107,.6)}
  .pip .dot.amber{background:var(--amber);box-shadow:0 0 .8vh rgba(224,166,61,.6)}
  .pip .dot.red{background:var(--red);box-shadow:0 0 .8vh rgba(224,93,93,.7)}

  /* mobile: vertical stack (same components, no cap) */
  #board{flex:1;display:grid;gap:1.6vh;grid-template-columns:2fr 1fr;
         grid-template-rows:1fr 1fr;grid-auto-rows:minmax(0,1fr)}
  @media (max-aspect-ratio: 1/1){
    #board{display:flex;flex-direction:column;overflow-y:auto}
    .primary{grid-row:auto}
    .msg{font-size:3.4vh}
  }

  .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;
        padding:2.4vh 1.6vw;display:flex;flex-direction:column;overflow:hidden}
  .card h2{font-size:1.7vh;font-weight:600;text-transform:uppercase;
           letter-spacing:.12em;color:var(--faint);margin-bottom:1.4vh}
  .stamp{margin-top:auto;padding-top:1.2vh;font-size:1.5vh;color:var(--faint)}
  .primary{grid-row:span 2}
  .msg{font-size:4.6vh;font-weight:600;line-height:1.25;margin-bottom:2vh}
  .sec{font-size:2.5vh;color:var(--dim);line-height:1.35;padding-left:1vw;
       border-left:3px solid var(--edge);margin-bottom:1.4vh}
  .empty{font-size:2.4vh;color:var(--dim)}
  .empty.ok::before{content:"✓ ";color:var(--green)}
  .empty.warn{color:var(--amber)}
  .alert{font-size:2.2vh;line-height:1.4;margin-bottom:1.4vh}
  .tier{display:inline-block;font-size:1.6vh;font-weight:700;letter-spacing:.08em;
        margin-right:.6vw}
  .tier.warning{color:var(--red)} .tier.watch{color:var(--amber)}
  .tier.advisory{color:var(--amber);opacity:.75}
  .attn-amber{border-color:rgba(224,166,61,.55);box-shadow:inset 0 0 0 1px rgba(224,166,61,.25)}
  .attn-red{border-color:rgba(224,93,93,.6);box-shadow:inset 0 0 0 1px rgba(224,93,93,.35)}
  .bullet{display:inline-flex;align-items:center;justify-content:center;
          width:3.4vh;height:3.4vh;border-radius:50%;font-weight:700;
          font-size:2.1vh;color:#fff;margin-right:.6vw;vertical-align:middle;
          font-family:Helvetica,Arial,sans-serif;text-transform:none;letter-spacing:0}
  .line-status{font-size:3vh;font-weight:600;line-height:1.2}
  .line-status.ok{color:var(--green)} .line-status.late{color:var(--amber)}
  .line-status.bad{color:var(--red)} .line-status.dim{color:var(--dim)}
  .line-head{font-size:1.9vh;color:var(--dim);line-height:1.35;margin-top:.8vh}
  .t-section{font-size:1.4vh;font-weight:600;text-transform:uppercase;
             letter-spacing:.12em;color:var(--faint);margin:1.4vh 0 .2vh}
  .t-row{display:flex;align-items:center;gap:.7vw;padding:1.1vh .2vw;
         border-top:1px solid var(--edge)}
  .t-row:first-of-type{border-top:none}
  .t-row .bullet{width:2.9vh;height:2.9vh;font-size:1.8vh;flex:none}
  .t-name{flex:1;min-width:0;font-size:2.1vh;font-weight:600;line-height:1.3}
  .t-seg{color:var(--dim);font-weight:400;font-size:1.8vh}
  .t-st{font-size:1.9vh;font-weight:600;white-space:nowrap}
  .t-route{align-items:flex-start}
  .t-legs{flex:1;min-width:0}
  .t-leg{display:flex;align-items:center;gap:.7vw;padding:.6vh 0}
  .t-leg .bullet{width:3vh;height:3vh;font-size:1.9vh;margin-right:0;flex:none}
  .t-leg .t-st{margin-left:auto}
  .t-stwrap{margin-left:auto;display:flex;flex-direction:column;
            align-items:flex-end;gap:.2vh}
  .t-stwrap .t-st{margin-left:0}
  .t-ride{font-size:1.6vh;color:var(--dim)}
  .t-legno{width:2.2vh;height:2.2vh;border-radius:50%;border:1px solid var(--faint);
           color:var(--faint);font-size:1.4vh;display:inline-flex;flex:none;
           align-items:center;justify-content:center;opacity:.5}
  .t-live{color:var(--green);font-weight:600;font-size:1.5vh;
          text-transform:uppercase;letter-spacing:.08em;
          position:relative;padding-left:1.5vh}
  .t-live::before,.t-live::after{content:"";position:absolute;left:0;top:50%;
      width:.9vh;height:.9vh;margin-top:-.45vh;border-radius:50%;
      background:var(--green)}
  .t-live::after{animation:ping 2.2s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{0%{transform:scale(1);opacity:.8}
                  70%,100%{transform:scale(2.6);opacity:0}}
  .t-legname{font-size:2.1vh}
  .t-detail{font-size:1.7vh;color:var(--dim);line-height:1.35;
            padding:0 .2vw .7vh 4vh;display:-webkit-box;-webkit-line-clamp:2;
            -webkit-box-orient:vertical;overflow:hidden}
  .tomorrow-strip{grid-column:1/-1;background:#10161f;border:1px solid var(--edge);
                  border-radius:14px;padding:1.4vh 1.6vw;display:flex;
                  justify-content:space-between;align-items:center;min-height:auto}
  .tomorrow-strip span{font-size:2.2vh;color:var(--dim)}
  .tomorrow-strip b{color:var(--text)}
  .tomorrow-strip .conf{font-size:1.5vh;color:var(--faint)}
  .ann{font-size:2.3vh;line-height:1.4;margin-bottom:1.1vh;color:var(--dim)}
  .ann.pri{color:var(--text)} .ann.pri::before{content:"● ";color:var(--amber)}
  .ann::before{content:"○ ";color:var(--faint)}
  .ann.pri::before{content:"● "}
  .disclaimer{font-size:1.4vh;color:var(--faint)}

  /* density presets (admin → Layout → Board density) */
  #board.compact{grid-template-columns:repeat(3,1fr)}
  #board.compact .primary{grid-row:auto}
  #board.compact .card{padding:1.8vh 1.2vw}
  #board.compact .msg{font-size:3vh}
  #board.compact .sec{font-size:2.1vh}
  #board.focus{grid-template-columns:3fr 2fr}
  #board.focus .msg{font-size:5.4vh}
</style>
</head>
<body>
  <header>
    <div class="clock"><span id="t">--:--</span><small id="d"></small></div>
    <div class="pip" id="pip"><span class="dot amber"></span><span>starting up</span></div>
  </header>

  <div id="board" hx-get="/fragments/board"
       hx-trigger="load, every 20s [document.visibilityState === 'visible']"
       hx-swap="innerHTML">
    <div class="card primary"><h2>Weather</h2><div class="empty">Loading…</div></div>
  </div>

<script>
  function tick(){
    const n = new Date();
    document.getElementById("t").textContent =
      n.toLocaleTimeString("en-US", {hour: "numeric", minute: "2-digit"});
    document.getElementById("d").textContent = " " +
      n.toLocaleDateString("en-US", {weekday: "long", month: "long", day: "numeric"});
    // night mode: 10 PM – 5:30 AM (V1.1 makes this a setting)
    const mins = n.getHours() * 60 + n.getMinutes();
    document.body.classList.toggle("night", mins >= 22 * 60 || mins < 5 * 60 + 30);
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
